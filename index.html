<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NGv — Congresso Nacional (Simulação Educacional)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet">
  <script>
    function fallbackImage(img){
      img.onerror = null;
      img.src = 'https://placehold.co/80x80/ffffff/0b6e3f?text=NGv';
    }
  </script>
  <style>
    :root {
      --verde: #0b6e3f;
      --amarelo: #ffd400;
      --branco: #ffffff;
      --azul: #0a4f9d;
      --cinza: #eaf2ea;
      --glass: #ffffffe8;
      --shadow: 0 30px 60px -34px #0b6e3f70;
      --texto: #1f2937;
      --borda: #d6dfd8;
      --urgente: #ffe3e3;
      --nao-urgente: #e5f6e9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--texto);
      background:
        radial-gradient(circle at top right, #f9ffe3 0, #f9ffe300 42%),
        radial-gradient(circle at 10% 20%, #ffe99566 0, #ffe99500 25%),
        radial-gradient(circle at 85% 70%, #8fffd433 0, #8fffd400 30%),
        radial-gradient(circle at left bottom, #d7f1df 0, #d7f1df00 35%),
        linear-gradient(180deg, #eef6ee 0%, #e8f0e8 100%);
    }
    .app-header {
      background: linear-gradient(125deg, #0b6e3f 0%, #11834f 45%, #1aa765 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .material-symbols-outlined { font-size: 19px; vertical-align: middle; }
    .brand img { width: 32px; height: 32px; object-fit: contain; background: white; border-radius: 50%; padding: 2px; }
    .brand strong { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .pill { background: #ffffff22; border: 1px solid #ffffff44; border-radius: 999px; padding: 4px 10px; font-size: 12px; }
    .btn {
      border: 1px solid var(--borda);
      background: white;
      border-radius: 10px;
      padding: 8px 11px;
      cursor: pointer;
      transition: all .15s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 20px #0b6e3f22; }
    .btn.primary { background: var(--verde); color: white; border-color: var(--verde); }
    .btn.warn { background: #a10d0d; color: white; border-color: #a10d0d; }
    .layout { display: grid; grid-template-columns: 280px 1fr; min-height: calc(100vh - 58px); }
    .sidebar { background: linear-gradient(180deg,#ffffffef,#f7fbf7ef); backdrop-filter: blur(10px); border-right: 1px solid var(--borda); padding: 12px; overflow: auto; }
    .main { padding: 12px; overflow: auto; }
    .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .tab-btn {
      border: 1px solid var(--borda);
      background: #ffffffe8;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .tab-btn.active { background: linear-gradient(120deg, var(--amarelo), #ffe76d); border-color: #c2a400; }
    .tab-btn:hover { border-color: #9ec9a9; }
    .panel { display: none; }
    .panel.active { display: block; }
    .card {
      background: var(--glass);
      border: 1px solid var(--borda);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
    }
    .grid { display: grid; gap: 8px; }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    input, select, textarea { width: 100%; border: 1px solid var(--borda); border-radius: 8px; padding: 8px; margin-top: 4px; }
    textarea { min-height: 72px; }
    .profile-head { display: flex; gap: 10px; align-items: center; }
    .avatar { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; border: 1px solid var(--borda); background: #f8faf8; }
    .selo { width: 36px; height: 20px; object-fit: cover; border-radius: 4px; border: 1px solid var(--borda); }
    .tag { font-size: 12px; background: #f3f4f6; border-radius: 999px; padding: 3px 8px; display: inline-block; margin-right: 6px; }
    .project.urgente { border-left: 6px solid #d82222; background: var(--urgente); }
    .project.normal { border-left: 6px solid #11923a; background: var(--nao-urgente); }
    .msg { background: #f2f5f3; border-radius: 12px; padding: 8px; margin: 6px 0; }
    .msg.me { background: #dcf6e6; }
    .meta { color: #5a6472; font-size: 12px; }
    .split { display: grid; grid-template-columns: 260px 1fr; gap: 10px; }
    .channels { border: 1px solid var(--borda); border-radius: 10px; padding: 6px; max-height: 460px; overflow: auto; }
    .chat { border: 1px solid var(--borda); border-radius: 10px; padding: 8px; }
    .small { font-size: 12px; }
    .notif { border-bottom: 1px dashed var(--borda); padding: 6px 0; }
    .state-flag { width: 24px; height: 16px; object-fit: cover; margin-right: 6px; vertical-align: middle; border: 1px solid #ddd; border-radius: 2px; }
    .media-grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 8px; }
    .media-item { display:flex; align-items:center; gap:8px; border:1px solid var(--borda); border-radius:10px; padding:8px; background:#fff; }
    .media-item img { width:36px; height:36px; object-fit:contain; }
    .icon-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border-radius:999px;background:#ffffffaa;border:1px solid var(--borda);font-size:12px;}
    .section-title{display:flex;align-items:center;gap:8px;font-weight:800;letter-spacing:.2px;}
    .state-line{display:flex;align-items:center;padding:3px 0;}
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--borda); }
      .grid.two, .grid.three, .split { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img id="headerRepublic" alt="Brasão da República" onerror="fallbackImage(this)" src="https://placehold.co/80x80/0b6e3f/ffffff?text=Servidor" />
      <img id="headerCamara" alt="Ícone Câmara" onerror="fallbackImage(this)" src="https://placehold.co/80x80/0b6e3f/ffffff?text=Servidor" />
      <img id="headerSenado" alt="Ícone Senado" onerror="fallbackImage(this)" src="https://placehold.co/80x80/0b6e3f/ffffff?text=Servidor" />
      <strong>NGv — Congresso Nacional (Simulação Educacional)</strong>
      <span class="icon-chip"><span class="material-symbols-outlined">verified</span>Portal Institucional</span>
    </div>
    <div class="header-actions">
      <span id="themePill" class="pill">Visitante</span>
      <button id="btnLogout" class="btn" onclick="logout()" style="display:none">Sair</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="card">
        <h3>Login / Cadastro</h3>
        <div class="grid">
          <label>Usuário<input id="loginUser" placeholder="conta" /></label>
          <label>Senha<input id="loginPass" type="password" placeholder="senha" /></label>
          <button class="btn primary" onclick="login()"><span class="material-symbols-outlined">login</span> Entrar</button>
        </div>
        <hr />
        <div class="grid">
          <label>Nome completo<input id="cadNome" /></label>
          <label>Conta<input id="cadUser" /></label>
          <label>Senha<input id="cadPass" type="password" /></label>
          <label>Tipo inicial
            <select id="cadRole">
              <option value="visitante">Civil / Visitante</option>
              <option value="deputado">Deputado</option>
              <option value="senador">Senador</option>
              <option value="governador">Governador</option>
              <option value="presidente_republica">Presidente da República</option>
              <option value="vice_presidente">Vice-Presidente</option>
            </select>
          </label>
          <button class="btn" onclick="register()"><span class="material-symbols-outlined">person_add</span> Criar conta</button>
        </div>
        <p class="small">Admin padrão: <b>CongressoNacional.org</b> / <b>777.cn</b>.</p>
      </div>

      <div class="card">
        <h3>Notificações</h3>
        <div id="notifs"></div>
      </div>

      <div class="card">
        <h3>Estados habilitados</h3>
        <div id="stateFlags" class="small"></div>
      </div>
    </aside>

    <main class="main">
      <div id="tabs" class="tabs"></div>

      <section id="tab-home" class="panel active"></section>
      <section id="tab-camara" class="panel"></section>
      <section id="tab-mesa" class="panel"></section>
      <section id="tab-projetos" class="panel"></section>
      <section id="tab-plenario" class="panel"></section>
      <section id="tab-gabinetes" class="panel"></section>
      <section id="tab-grupos" class="panel"></section>
      <section id="tab-perfil" class="panel"></section>
      <section id="tab-admin" class="panel"></section>
    </main>
  </div>

<script>
const PROTOCOLOS = [
  'Projeto de Lei Ordinária (PL)','Proposta de Emenda à Constituição (PEC)','Projeto de Decreto Legislativo (PDL)','Projeto de Lei Complementar (PLP)','Projeto de Resolução (PR)','Requerimento de Comissão (RC)','Requerimento de Informação (RI)','Requerimento de Instituição de CPI','Emenda ao Orçamento','Orçamento (Federal, Estadual ou Municipal)','Indicação','Outros: ESPECIFICAR'
];
const MESA_CARGOS = ['Presidente','Vice-Presidente','Secretário-Geral','Segundo Secretário','Líder da Maioria','Líder da Minoria'];
const ESTADOS = ['Pernambuco','Rio Grande do Sul','São Paulo','Amazonas','Goiás'];
const TABS = [
  {id:'home', name:'Página Inicial'}, {id:'camara', name:'Câmara dos Deputados'}, {id:'mesa', name:'Mesa Diretora'}, {id:'projetos', name:'Projetos e Proposições'}, {id:'plenario', name:'Plenário Virtual'}, {id:'gabinetes', name:'Gabinetes'}, {id:'grupos', name:'Grupos/Fórum'}, {id:'perfil', name:'Perfil'}, {id:'admin', name:'Admin'}
];

const DEFAULT_SYMBOLS = {
  republica:'https://upload.wikimedia.org/wikipedia/commons/1/1b/Bras%C3%A3o_da_Republica_Federativa_do_Brasil.svg',
  camara:'https://upload.wikimedia.org/wikipedia/commons/8/8a/Bras%C3%A3o_da_C%C3%A2mara_dos_Deputados_do_Brasil.svg',
  senado:'https://upload.wikimedia.org/wikipedia/commons/f/f4/Coat_of_arms_of_Brazilian_Senate.svg',
  pernambuco:'https://upload.wikimedia.org/wikipedia/commons/8/88/Bandeira_de_Pernambuco.svg',
  rio_grande_do_sul:'https://upload.wikimedia.org/wikipedia/commons/6/63/Bandeira_do_Rio_Grande_do_Sul.svg',
  sao_paulo:'https://upload.wikimedia.org/wikipedia/commons/5/59/Bandeira_de_S%C3%A3o_Paulo.svg',
  amazonas:'https://upload.wikimedia.org/wikipedia/commons/6/6b/Bandeira_do_Amazonas.svg',
  goias:'https://upload.wikimedia.org/wikipedia/commons/b/bb/Bandeira_de_Goi%C3%A1s.svg'
};
const SERVER_PLACEHOLDER = 'https://placehold.co/96x96/0b6e3f/ffffff?text=Servidor';

const empty = {
  users:[], projects:[], sessions:[], notifs:[], cabinets:[], groups:[], secom:[], settings:{tabNames:{}, symbols:{}}, election:{candidates:[], presidentId:null},
};
let db = loadDB();
let currentUser = JSON.parse(localStorage.getItem('ngvCurrentUser') || 'null');
let currentCabinet = null;
let currentGroup = null;

ensureAdmin();
renderAll();

function loadDB(){
  try {
    return { ...empty, ...JSON.parse(localStorage.getItem('ngvDB') || '{}') };
  } catch { return structuredClone(empty); }
}
function saveDB(){ localStorage.setItem('ngvDB', JSON.stringify(db)); localStorage.setItem('ngvCurrentUser', JSON.stringify(currentUser)); }
function ensureAdmin(){
  const has = db.users.some(u=>u.username==='CongressoNacional.org');
  if(!has){ db.users.push({id:uid(), name:'Administrador Geral', username:'CongressoNacional.org', password:'777.cn', role:'admin', house:'congresso', state:'', photo:'', banner:'', badge:'', desc:'', isMesa:false, mesaCargo:'', likes:[], reposts:[]}); saveDB(); }
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function esc(s=''){ return String(s).replace(/[&<>\"]/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m])); }
function canMesaConvocar(user){ return user && (user.role==='admin' || user.isMesa===true); }
function userById(id){ return db.users.find(u=>u.id===id); }
function addNotif(house,msg){ db.notifs.unshift({id:uid(), ts:new Date().toISOString(), house, msg}); saveDB(); }
function canCreateProject(u){ return u && ['admin','deputado','senador','governador','presidente_republica','vice_presidente'].includes(u.role); }


function symbolUrl(key){
  const v = db.settings?.symbols?.[key] || '';
  return v || SERVER_PLACEHOLDER;
}
function stateKey(nome){
  return nome.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,'_');
}
function renderOfficialMedia(){
  const side = document.getElementById('stateFlags');
  if(side){
    side.innerHTML = ESTADOS.map(st=>`<div class="state-line"><img class="state-flag" onerror="fallbackImage(this)" src="${symbolUrl(stateKey(st))}" />${esc(st)}</div>`).join('');
  }
  const hr = document.getElementById('headerRepublic');
  const hc = document.getElementById('headerCamara');
  const hs = document.getElementById('headerSenado');
  if(hr) hr.src = symbolUrl('republica');
  if(hc) hc.src = symbolUrl('camara');
  if(hs) hs.src = symbolUrl('senado');
}
function applyTheme(){
  const pill = document.getElementById('themePill');
  const root = document.documentElement;
  const role = currentUser?.role || 'visitante';
  if(role==='senador'){ root.style.setProperty('--verde','#0a4f9d'); pill.textContent='Senado (azul/branco)'; }
  else if(role==='visitante'){ root.style.setProperty('--verde','#0b6e3f'); pill.textContent='Visitante (verde/amarelo/branco)'; }
  else { root.style.setProperty('--verde','#0b6e3f'); pill.textContent=`${currentUser?.name || 'Visitante'} • ${role}`; }
}

function switchTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`tab-${id}`).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(t=>t.classList.toggle('active', t.dataset.tab===id));
}

function tabIcon(id){
  return ({home:'home',camara:'gavel',mesa:'account_balance',projetos:'description',plenario:'tv',gabinetes:'meeting_room',grupos:'forum',perfil:'badge',admin:'admin_panel_settings'})[id] || 'dashboard';
}
function renderTabs(){
  const c = document.getElementById('tabs');
  c.innerHTML = TABS.map(t=>`<button class="tab-btn" data-tab="${t.id}" onclick="switchTab('${t.id}')"><span class="material-symbols-outlined">${tabIcon(t.id)}</span> ${esc(db.settings.tabNames[t.id]||t.name)}</button>`).join('');
}

function register(){
  const name = val('cadNome'); const username = val('cadUser'); const password = val('cadPass'); const role = val('cadRole');
  if(!name || !username || !password) return alert('Preencha nome, conta e senha.');
  if(db.users.some(u=>u.username===username)) return alert('Conta já existe.');
  const user = {id:uid(), name, username, password, role, house: role==='senador'?'senado':'camara', state:'', photo:'', banner:'', badge:'', desc:'', isMesa:false, mesaCargo:'', likes:[], reposts:[]};
  db.users.push(user); saveDB(); alert('Conta criada com sucesso.');
  ['cadNome','cadUser','cadPass'].forEach(id=>document.getElementById(id).value='');
  renderAll();
}
function login(){
  const username = val('loginUser'); const password = val('loginPass');
  const user = db.users.find(u=>u.username===username && u.password===password);
  if(!user) return alert('Credenciais inválidas.');
  currentUser = user; saveDB(); renderAll();
}
function logout(){ currentUser = null; saveDB(); renderAll(); }
function val(id){ return document.getElementById(id)?.value?.trim() || ''; }

function renderHome(){
  const sessions = db.sessions.slice(0,8).map(s=>`<div class="card"><b>${esc(s.title)}</b><div class="meta">${esc(s.house)} • ${new Date(s.createdAt).toLocaleString('pt-BR')} • ${s.status}</div><div>Ata inicial: ${esc(s.ataInicial||'-')}</div></div>`).join('') || '<div class="card">Sem sessões.</div>';
  const secom = db.secom.slice(0,6).map(p=>`<div class="card"><b>SECOM:</b> ${esc(p.text)}<div class="meta">por ${esc(userById(p.userId)?.name||'')}</div>${p.mediaUrl?`<a href="${esc(p.mediaUrl)}" target="_blank">Abrir mídia</a>`:''}</div>`).join('');
  const simbolos = [
    {nome:'República Federativa do Brasil', tipo:'Brasão', url:symbolUrl('republica')},
    {nome:'Câmara dos Deputados', tipo:'Brasão', url:symbolUrl('camara')},
    {nome:'Senado Federal', tipo:'Brasão', url:symbolUrl('senado')},
    {nome:'Pernambuco', tipo:'Bandeira', url:symbolUrl('pernambuco')},
    {nome:'Rio Grande do Sul', tipo:'Bandeira', url:symbolUrl('rio_grande_do_sul')},
    {nome:'São Paulo', tipo:'Bandeira', url:symbolUrl('sao_paulo')},
    {nome:'Amazonas', tipo:'Bandeira', url:symbolUrl('amazonas')},
    {nome:'Goiás', tipo:'Bandeira', url:symbolUrl('goias')}
  ];
  document.getElementById('tab-home').innerHTML = `
    <div class="grid two">
      <div class="card"><h2 class="section-title"><span class="material-symbols-outlined">event_available</span>Convocação de Sessões</h2>${sessions}</div>
      <div class="card"><h2 class="section-title"><span class="material-symbols-outlined">notifications_active</span>Avisos e Notificações</h2><div>${db.notifs.slice(0,10).map(n=>`<div class="notif">${esc(n.msg)}<div class="meta">${new Date(n.ts).toLocaleString('pt-BR')}</div></div>`).join('')||'Sem avisos.'}</div></div>
    </div>
    <div class="card">
      <h2 class="section-title"><span class="material-symbols-outlined">flag</span>Brasões e Bandeiras Oficiais</h2>
      <div class="media-grid">
        ${simbolos.map(s=>`<a class="media-item" href="${s.url}" target="_blank"><img src="${s.url}" onerror="fallbackImage(this)" alt="${esc(s.nome)}"><div><b>${esc(s.nome)}</b><div class="meta">${esc(s.tipo)}</div></div></a>`).join('')}
      </div>
    </div>
    <div class="card"><h2 class="section-title"><span class="material-symbols-outlined">campaign</span>Canal SECOM (Presidência)</h2>${secom||'Sem pronunciamentos.'}</div>
  `;
}

function renderCamara(){
  const users = db.users.filter(u=>['deputado','senador','governador','presidente_republica','vice_presidente'].includes(u.role));
  document.getElementById('tab-camara').innerHTML = `
    <div class="card">
      <h2>Cadastro de Personagens / Parlamentares</h2>
      <div class="grid three">
        <label>Nome<input id="novoNome"></label>
        <label>Conta<input id="novoUser"></label>
        <label>Senha<input id="novoPass" type="password"></label>
        <label>Cargo<select id="novoCargo">${['deputado','senador','governador','presidente_republica','vice_presidente'].map(r=>`<option>${r}</option>`)}</select></label>
        <label>Casa<select id="novaCasa"><option value="camara">Câmara</option><option value="senado">Senado</option></select></label>
        <label>Estado<select id="novoEstado"><option value=""></option>${ESTADOS.map(e=>`<option>${e}</option>`)}</select></label>
      </div>
      <button class="btn primary" onclick="createParlamentarByAdmin()">Criar perfil parlamentar</button>
    </div>
    ${users.map(u=>`<div class="card"><div class="profile-head"><img class="avatar" src="${esc(u.photo||'https://placehold.co/100x100')}" /><div><b>${esc(u.name)}</b> ${u.badge?`<img class="selo" src="${esc(u.badge)}">`:''}<div class="meta">@${esc(u.username)} • ${esc(u.role)} • ${esc(u.house)}</div></div></div><div>${u.isMesa?`<span class="tag">Mesa Diretora: ${esc(u.mesaCargo)}</span>`:''}<span class="tag">Estado: ${esc(u.state||'-')}</span></div></div>`).join('')}
  `;
}
function createParlamentarByAdmin(){
  if(!currentUser || currentUser.role!=='admin') return alert('Apenas admin.');
  const name = val('novoNome'), username=val('novoUser'), password=val('novoPass'), role=val('novoCargo'), house=val('novaCasa'), state=val('novoEstado');
  if(!name||!username||!password) return alert('Dados obrigatórios.');
  if(role==='governador' && !ESTADOS.includes(state)) return alert('Governador deve ser de estado habilitado.');
  if(db.users.some(u=>u.username===username)) return alert('Conta já existe.');
  if(role==='deputado' && db.users.filter(u=>u.role==='deputado').length>=50) return alert('Limite de 50 deputados atingido.');
  db.users.push({id:uid(), name, username, password, role, house, state, photo:'', banner:'', badge:'', desc:'', isMesa:false, mesaCargo:'', likes:[], reposts:[]});
  saveDB(); renderAll();
}

function renderMesa(){
  const byHouse = (h)=>db.users.filter(u=>u.house===h && ['deputado','senador'].includes(u.role));
  document.getElementById('tab-mesa').innerHTML = `
    <div class="card">
      <h2>Mesa Diretora da Câmara</h2>
      <p class="small">Somente membros da mesa (ou admin) podem convocar sessões e controlar tempo de ata/pauta/votação.</p>
      <div class="grid three">
        <label>Parlamentar<select id="mesaUser">${byHouse('camara').map(u=>`<option value="${u.id}">${esc(u.name)}</option>`)}</select></label>
        <label>Cargo<select id="mesaCargo">${MESA_CARGOS.map(c=>`<option>${c}</option>`)}</select></label>
        <button class="btn primary" onclick="atribuirMesa()">Atribuir cargo</button>
      </div>
    </div>
    <div class="card"><h3>Composição atual</h3>${db.users.filter(u=>u.isMesa).map(u=>`<div>${esc(u.name)} — ${esc(u.mesaCargo)} (${esc(u.house)})</div>`).join('')||'Sem composição.'}</div>
    <div class="card">
      <h3>Eleição da Mesa</h3>

function atribuirMesa(){

function addCandidate(){ if(!currentUser) return alert('Faça login.'); db.election.candidates.push({userId:val('candId'), votes:0}); saveDB(); renderAll(); }
function voteCandidate(id){ if(!currentUser) return alert('Faça login.'); const c=db.election.candidates.find(x=>x.userId===id); if(c) c.votes++; saveDB(); renderAll(); }
function transferirPresidencia(id){
  if(!currentUser || currentUser.role!=='admin') return alert('Apenas admin pode efetivar.');
  db.election.presidentId = id;
  db.users.forEach(u=>{ if(u.house==='camara' && u.mesaCargo==='Presidente') {u.isMesa=false;u.mesaCargo='';} });
  const win = userById(id); if(win){ win.isMesa=true; win.mesaCargo='Presidente'; addNotif(win.house,`Presidência da Mesa transferida para ${win.name}.`); }
  saveDB(); renderAll();
}

async function fileToDataUrl(file){
  if(!file) return '';
  return await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
}

async function createProject(){
  if(!canCreateProject(currentUser)) return alert('Seu perfil não pode protocolar proposições.');

  db.projects.unshift({id:uid(), title, type:val('projTipo'), house:val('projCasa'), urgency:val('projUrg'), state:val('projEstado'), desc:val('projDesc'), authorId:currentUser.id, files, tramite:[{ts:Date.now(),text:'Protocolo digital realizado.'}], inSessionId:null, likes:0, votes:[]});

    <hr>

    <hr>

    ${s.activeVote?renderVoteBox(s):'Nenhuma votação aberta.'}

    <button class="btn warn" onclick="endSession('${s.id}')">Encerrar sessão</button>

function startSession(){
  if(!canMesaConvocar(currentUser)) return alert('Apenas Mesa Diretora ou admin pode convocar sessão.');
  const house = val('sessHouse');
  const s = {id:uid(), title:val('sessTitle')||`Sessão ${new Date().toLocaleString('pt-BR')}`, house, createdAt:Date.now(), status:'aberta', ataInicial:val('ataInicial'), ataFinal:'', presence:{}, agenda:[], presenceDeadline:Date.now()+Number(val('tempoPresenca')||15)*60000, activeVote:null};
  db.sessions.unshift(s); addNotif(house,`Sessão convocada: ${s.title}`); saveDB(); renderAll();
}
function setPresence(sessionId,status){
  const s=db.sessions.find(x=>x.id===sessionId); if(!s||!currentUser) return;
  if(Date.now()>s.presenceDeadline) return alert('Tempo de presença encerrado.');
  s.presence[currentUser.id]=status; saveDB(); renderPlenario();
}
function addToAgenda(sessionId){
  if(!canMesaConvocar(currentUser)) return alert('Apenas mesa.');
  const s=db.sessions.find(x=>x.id===sessionId); const pid=val('pautaProj'); if(!s||!pid) return;
  if(!s.agenda.includes(pid)) s.agenda.push(pid);
  const p=db.projects.find(x=>x.id===pid); if(p){ p.inSessionId=s.id; p.tramite.push({ts:Date.now(),text:`Entrou em pauta da sessão ${s.title}.`}); }
  addNotif(s.house,`Nova pauta na sessão ${s.title}.`); saveDB(); renderPlenario();
}
function openVote(sessionId,projectId){
  if(!canMesaConvocar(currentUser)) return alert('Apenas mesa.');
  const s=db.sessions.find(x=>x.id===sessionId);
  s.activeVote = {projectId, startedAt:Date.now(), deadline:Date.now()+5*60000, votes:{}};
  saveDB(); renderPlenario();
}
function renderVoteBox(s){
  const av=s.activeVote; const p=db.projects.find(x=>x.id===av.projectId);
  const lines = Object.entries(av.votes).map(([uid,v])=>`${esc(userById(uid)?.name||'')}: ${esc(v.choice)}${v.reason?` (${esc(v.reason)})`:''} [${esc(v.bancada||'-')}]`).join('<br>')||'Sem votos';
  const mine = currentUser ? av.votes[currentUser.id] : null;
  return `<div class='card'><b>Projeto:</b> ${esc(p?.title||'')}<div class='meta'>Encerramento: ${new Date(av.deadline).toLocaleTimeString('pt-BR')}</div>
    <div class='grid two'>
      <label>Sustentação de voto<textarea id='sustVote'>${esc(mine?.reason||'')}</textarea></label>
      <label>Bancada<input id='bancadaVote' value='${esc(mine?.bancada||'')}' placeholder='Nome da bancada / quantitativo'></label>
    </div>
    <button class='btn' onclick="castVote('${s.id}','favoravel')">Favorável</button>
    <button class='btn' onclick="castVote('${s.id}','contrario')">Contrário</button>
    <button class='btn' onclick="castVote('${s.id}','abstencao')">Abstenção</button>
    <button class='btn warn' onclick="closeVote('${s.id}')">Fechar votação</button>
    <div class='card'>${lines}</div>
  </div>`;
}
function castVote(sessionId,choice){
  const s=db.sessions.find(x=>x.id===sessionId); if(!s||!currentUser||!s.activeVote) return;
  if(Date.now()>s.activeVote.deadline) return alert('Tempo de votação encerrado.');
  s.activeVote.votes[currentUser.id] = {choice, reason:val('sustVote'), bancada:val('bancadaVote')};
  saveDB(); renderPlenario();
}
function closeVote(sessionId){
  if(!canMesaConvocar(currentUser)) return alert('Apenas mesa.');
  const s=db.sessions.find(x=>x.id===sessionId); if(!s?.activeVote) return;
  const project = db.projects.find(p=>p.id===s.activeVote.projectId);
  const voteRecords = Object.entries(s.activeVote.votes).map(([userId,v])=>({userId,...v,sessionId:s.id,ts:Date.now()}));
  if(project){ project.votes.push(...voteRecords); project.tramite.push({ts:Date.now(),text:`Votação encerrada em sessão ${s.title}.`}); }
  s.activeVote = null; saveDB(); renderPlenario();
}
function endSession(sessionId){
  if(!canMesaConvocar(currentUser)) return alert('Apenas mesa.');
  const s=db.sessions.find(x=>x.id===sessionId); if(!s) return;
  s.status='encerrada'; s.ataFinal=val('ataFinal');
  addNotif(s.house,`Sessão encerrada: ${s.title}. Ata final registrada.`);
  saveDB(); renderAll();
}

function canAccessCab(c){
  if(!currentUser) return false;
  if(currentUser.role==='admin') return true;
  if(c.ownerId===currentUser.id) return true;
  return (c.members||[]).includes(currentUser.id);
}
function createCabinet(){
  if(!currentUser) return alert('Faça login.');
  db.cabinets.push({id:uid(), name:val('cabName'), image:val('cabImg'), visibility:val('cabVis'), ownerId:currentUser.id, members:[currentUser.id], requests:[], messages:[]});
  saveDB(); renderGabinetes();
}
function requestCabinet(id){
  if(!currentUser) return alert('Faça login.');
  const c=db.cabinets.find(x=>x.id===id); if(!c) return;
  if(!c.requests.includes(currentUser.id)) c.requests.push(currentUser.id);
  saveDB(); renderGabinetes();
}
function openCabinet(id){
  currentCabinet=id;
  const c=db.cabinets.find(x=>x.id===id); if(!c) return;
  const detail=document.getElementById('cabDetail');
  if(!canAccessCab(c)){ detail.innerHTML = `<b>Acesso restrito.</b> Aguarde aprovação.`; return; }
  const reqBlock = (currentUser?.id===c.ownerId || currentUser?.role==='admin') ? `<div class='card'><b>Solicitações</b>${(c.requests||[]).map(uid=>`<div>${esc(userById(uid)?.name||uid)} <button class='btn' onclick="approveCab('${c.id}','${uid}')">Aprovar</button></div>`).join('')||'Sem solicitações'}</div>` : '';
  detail.innerHTML = `
    <div><h3>${esc(c.name)}</h3>${c.image?`<img src='${esc(c.image)}' style='width:100%;max-height:120px;object-fit:cover;border-radius:8px'>`:''}</div>
    ${reqBlock}
    <div style='max-height:280px;overflow:auto'>${c.messages.map(m=>`<div class='msg ${m.userId===currentUser?.id?'me':''}'><b>${esc(userById(m.userId)?.name||'')}</b><div>${esc(m.text)}</div>${m.media?`<a target='_blank' href='${esc(m.media)}'>mídia</a>`:''}<div class='small'>${new Date(m.ts).toLocaleString('pt-BR')}</div></div>`).join('')}</div>
    <label>Mensagem<textarea id='cabText'></textarea></label>
    <label>Mídia URL<input id='cabMedia'></label>
    <button class='btn primary' onclick="sendCabMsg('${c.id}')">Enviar</button>
  `;
}
function approveCab(cabId,userId){ const c=db.cabinets.find(x=>x.id===cabId); if(!c) return; c.members.push(userId); c.requests = c.requests.filter(x=>x!==userId); saveDB(); openCabinet(cabId); }
function sendCabMsg(cabId){
  const c=db.cabinets.find(x=>x.id===cabId); if(!c||!currentUser||!canAccessCab(c)) return;
  c.messages.push({id:uid(), userId:currentUser.id, text:val('cabText'), media:val('cabMedia'), ts:Date.now()});
  saveDB(); openCabinet(cabId);
}

      <button class='btn' onclick='createPost()'>Publicar</button>
      <button class='btn' onclick='createSecom()'>Publicar na SECOM (somente Presidente)</button>
      <div>${(db.secom.filter(p=>p.userId===me.id)).map(p=>`<div class='msg'>${esc(p.text)} ${p.mediaUrl?`<a href='${esc(p.mediaUrl)}' target='_blank'>mídia</a>`:''} <button class='btn' onclick="likeSecom('${p.id}')">Curtir (${p.likes||0})</button> <button class='btn' onclick="repostSecom('${p.id}')">Republicar</button></div>`).join('')||'Sem publicações.'}</div>
    </div>
  `;
}
function saveProfile(){
  const me=userById(currentUser.id); if(!me) return;
  me.photo=val('pfPhoto'); me.banner=val('pfBanner'); me.badge=val('pfBadge'); me.desc=val('pfDesc'); me.state=val('pfState');
  me.isMesa=val('pfMesa')==='sim'; me.mesaCargo=val('pfMesaCargo');
  currentUser = me; saveDB(); renderAll();
}
function createPost(){
  if(!currentUser) return; db.secom.unshift({id:uid(), userId:currentUser.id, text:val('postText'), mediaUrl:val('postMedia'), likes:0, ts:Date.now()}); saveDB(); renderPerfil();
}
function createSecom(){
  if(!currentUser || currentUser.role!=='presidente_republica') return alert('Apenas Presidente da República.');
  db.secom.unshift({id:uid(), userId:currentUser.id, text:val('postText'), mediaUrl:val('postMedia'), likes:0, ts:Date.now()});
  addNotif('congresso','Novo pronunciamento oficial SECOM da Presidência.');
  saveDB(); renderAll();
}
function likeSecom(id){ const p=db.secom.find(x=>x.id===id); if(p){ p.likes=(p.likes||0)+1; saveDB(); renderPerfil(); } }
function repostSecom(id){ const p=db.secom.find(x=>x.id===id); if(!p||!currentUser) return; db.secom.unshift({...p,id:uid(),userId:currentUser.id,text:'[Republicação] '+p.text}); saveDB(); renderPerfil(); }

function renderAdmin(){
  const allow = currentUser?.role==='admin';
  document.getElementById('tab-admin').innerHTML = !allow ? `<div class='card'>Apenas administrador.</div>` : `
    <div class='card'><h2>Painel administrativo</h2>
      <div class='grid two'>
        <label>Renomear aba<select id='abakey'>${TABS.map(t=>`<option value='${t.id}'>${t.name}</option>`)}</select></label>
        <label>Novo nome<input id='abaname'></label>
      </div>
      <button class='btn' onclick='renameTab()'><span class='material-symbols-outlined'>edit_square</span> Salvar nome da aba</button>
      <hr>
      <h3 class='section-title'><span class='material-symbols-outlined'>flag</span>Mídia oficial (URL)</h3>
      <div class='grid two'>
        <label>Brasão da República<input id='sym_republica' placeholder='https://...' value='${esc(db.settings?.symbols?.republica||'')}'></label>
        <label>Brasão da Câmara<input id='sym_camara' placeholder='https://...' value='${esc(db.settings?.symbols?.camara||'')}'></label>
        <label>Brasão do Senado<input id='sym_senado' placeholder='https://...' value='${esc(db.settings?.symbols?.senado||'')}'></label>
        <label>Bandeira Pernambuco<input id='sym_pernambuco' placeholder='https://...' value='${esc(db.settings?.symbols?.pernambuco||'')}'></label>
        <label>Bandeira Rio Grande do Sul<input id='sym_rio_grande_do_sul' placeholder='https://...' value='${esc(db.settings?.symbols?.rio_grande_do_sul||'')}'></label>
        <label>Bandeira São Paulo<input id='sym_sao_paulo' placeholder='https://...' value='${esc(db.settings?.symbols?.sao_paulo||'')}'></label>
        <label>Bandeira Amazonas<input id='sym_amazonas' placeholder='https://...' value='${esc(db.settings?.symbols?.amazonas||'')}'></label>
        <label>Bandeira Goiás<input id='sym_goias' placeholder='https://...' value='${esc(db.settings?.symbols?.goias||'')}'></label>
      </div>
      <button class='btn primary' onclick='saveOfficialMedia()'><span class='material-symbols-outlined'>save</span> Salvar URLs oficiais</button>
      <p class='small'>Se ficar vazio, o sistema exibe ícone padrão de servidor.</p>
      <hr>
      <button class='btn warn' onclick='purgeAll()'><span class='material-symbols-outlined'>delete_forever</span> Reset geral</button>
    </div>
    <div class='card'><h3>Gerenciar contas</h3>${db.users.map(u=>`<div>${esc(u.name)} (@${esc(u.username)}) <button class='btn warn' onclick="removeUser('${u.id}')">Excluir</button></div>`).join('')}</div>
    <div class='card'><h3>Moderação de publicações</h3>${db.secom.map(p=>`<div>${esc(p.text).slice(0,80)} <button class='btn warn' onclick="deletePost('${p.id}')">Excluir</button></div>`).join('')||'Sem publicações'}</div>
  `;
}
function renameTab(){ db.settings.tabNames[val('abakey')] = val('abaname'); saveDB(); renderTabs(); }
function saveOfficialMedia(){
  if(!db.settings.symbols) db.settings.symbols = {};
  ['republica','camara','senado','pernambuco','rio_grande_do_sul','sao_paulo','amazonas','goias'].forEach(k=>{
    db.settings.symbols[k] = val('sym_'+k);
  });
  saveDB();
  renderAll();
}
function purgeAll(){ if(!confirm('Confirmar reset?')) return; db = structuredClone(empty); ensureAdmin(); currentUser=null; saveDB(); renderAll(); }
function removeUser(id){ if(currentUser?.role!=='admin') return; db.users = db.users.filter(u=>u.id!==id || u.username==='CongressoNacional.org'); saveDB(); renderAll(); }
function deletePost(id){ db.secom = db.secom.filter(p=>p.id!==id); saveDB(); renderAdmin(); }

function renderNotifs(){
  const mineHouse = currentUser?.house || 'congresso';
  const items = db.notifs.filter(n=>n.house===mineHouse || n.house==='congresso').slice(0,8);
  document.getElementById('notifs').innerHTML = items.map(n=>`<div class='notif'><div>${esc(n.msg)}</div><div class='meta'>${new Date(n.ts).toLocaleString('pt-BR')}</div></div>`).join('') || 'Sem notificações';
}

function renderStats(){
  const byUser = db.users.filter(u=>['deputado','senador'].includes(u.role)).map(u=>{
    const projects = db.projects.filter(p=>p.authorId===u.id).length;
    const pres = db.sessions.filter(s=>s.presence[u.id]==='presente').length;
    const votes = db.projects.flatMap(p=>p.votes||[]).filter(v=>v.userId===u.id).length;
    return `<div>${esc(u.name)} — projetos: ${projects}, presenças: ${pres}, votos: ${votes}</div>`;
  }).join('') || 'Sem dados';
  document.getElementById('tab-home').innerHTML += `<div class='card'><h2>Estatísticas automáticas</h2>${byUser}</div>`;
}

function renderAll(){
  if(!db.settings.symbols || !Object.keys(db.settings.symbols).length){
    db.settings.symbols = {...DEFAULT_SYMBOLS, ...(db.settings.symbols||{})};
  }
  document.getElementById('btnLogout').style.display = currentUser ? 'inline-block':'none';
  currentUser = currentUser ? userById(currentUser.id) || null : null;
  applyTheme(); renderTabs(); renderOfficialMedia(); renderHome(); renderCamara(); renderMesa(); renderProjetos(); renderPlenario(); renderGabinetes(); renderGrupos(); renderPerfil(); renderAdmin(); renderNotifs(); renderStats(); switchTab('home');
}
</script>
</body>
</html>
